<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - CoreInventory</title>
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/auth.css">
</head>

<body class="auth-page">

    <div class="auth-card">
        <div>
            <h1>CoreInventory</h1>
            <p class="subtitle">Sign in to continue</p>
        </div>

        <div id="success-msg" class="success-msg"></div>
        <div id="error-msg" class="error-msg"></div>

        <form id="login-form">
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" class="input-field" required autocomplete="email">
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" class="input-field" required autocomplete="current-password">
            </div>

            <button type="submit" class="btn-primary" id="login-btn" style="margin-top: 24px;">Login</button>
        </form>

        <div style="text-align: center;">
            <a href="forgot-password.html" class="auth-link">Forgot Password?</a><br>
            <a href="signup.html" class="auth-link" style="color: var(--text-muted); margin-top: 15px;">Don't have an
                account? Sign up</a>
        </div>
    </div>

    <script src="../js/api.js"></script>
    <script src="../js/auth.js"></script>
</body>

</html>
