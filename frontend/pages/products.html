<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products - CoreInventory</title>
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/layout.css">
    <link rel="stylesheet" href="../css/products.css">
</head>

<body>
    <div class="app-shell">
        <div id="sidebar"></div>
        <div class="main-wrapper">
            <div id="topnav"></div>

            <div class="page-content">
                <div class="page-header">
                    <div style="display: flex; align-items: center; gap: 24px;">
                        <h2>Products</h2>
                        <div class="filter-bar" id="stock-filters">
                            <button class="filter-pill active" data-filter="">All</button>
                            <button class="filter-pill" data-filter="low_stock">Low Stock</button>
                            <button class="filter-pill" data-filter="out_of_stock">Out of Stock</button>
                        </div>
                    </div>
                    <button class="btn-primary" id="new-product-btn" style="width:auto">+ New Product</button>
                </div>

                <input type="text" class="input-field" id="search-input" placeholder="Search by name or SKU..."
                    style="max-width: 400px; margin-bottom: 16px;">

                <div id="spinner" class="spinner-wrap" style="display:none;">
                    <div class="spinner"></div>
                </div>

                <table class="data-table" id="products-table">
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>SKU</th>
                            <th>Category</th>
                            <th>Unit</th>
                            <th>On Hand</th>
                            <th>Reorder Level</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="products-tbody">
                        <!-- Rendered by JS -->
                    </tbody>
                </table>

                <!-- Modal overlay -->
                <div id="modal-overlay" class="modal-overlay" style="display:none">
                    <div class="modal-card">
                        <div class="modal-header">
                            <h3 id="modal-title">New Product</h3>
                            <button id="modal-close" class="modal-close">✕</button>
                        </div>
                        <div class="modal-body">
                            <input type="hidden" id="product-id">

                            <div class="form-group">
                                <label>Name</label>
                                <input type="text" id="product-name" class="input-field">
                            </div>

                            <div class="form-group">
                                <label>SKU</label>
                                <input type="text" id="product-sku" class="input-field">
                            </div>

                            <div class="form-group">
                                <label>Category</label>
                                <input type="text" id="product-category" class="input-field">
                            </div>

                            <div class="form-group">
                                <label>Unit of Measure</label>
                                <input type="text" id="product-unit" class="input-field"
                                    placeholder="e.g. pcs, kg, boxes">
                            </div>

                            <div class="form-group">
                                <label>Reorder Level</label>
                                <input type="number" id="product-reorder" class="input-field" value="0" min="0">
                            </div>

                            <div id="modal-error" class="error-msg"></div>
                        </div>
                        <div class="modal-footer">
                            <button class="btn-secondary" id="modal-cancel-btn" style="width:auto">Cancel</button>
                            <button class="btn-primary" id="modal-save-btn" style="width:auto">Save</button>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script src="../js/api.js"></script>
    <script src="../js/layout.js"></script>
    <script src="../js/products.js"></script>
</body>

</html>
