<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Warehouses — Warehouses - CoreInventory</title>
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/layout.css">
    <link rel="stylesheet" href="../css/products.css">
    <link rel="stylesheet" href="../css/warehouse.css">
</head>

<body>
    <div class="app-shell">
        <div id="sidebar"></div>
        <div class="main-wrapper">
            <div id="topnav"></div>

            <div class="page-content">
                <div class="page-header">
                    <h2>Warehouses</h2>
                    <button class="btn-primary" id="add-wh-btn" style="width:auto">+ Add Warehouse</button>
                </div>

                <div id="spinner" class="spinner-wrap" style="display:none;">
                    <div class="spinner"></div>
                </div>
                <div id="warehouses-grid" class="warehouses-grid"></div>

                <!-- ADD WAREHOUSE MODAL -->
                <div id="wh-modal-overlay" class="modal-overlay" style="display:none">
                    <div class="modal-card">
                        <div class="modal-header">
                            <h3>New Warehouse</h3>
                            <button id="wh-modal-close" class="modal-close">✕</button>
                        </div>
                        <div class="modal-body">
                            <div class="form-group">
                                <label>Warehouse Name</label>
                                <input type="text" id="wh-name" class="input-field"
                                    placeholder="e.g. Main Distribution Center">
                            </div>
                            <div class="form-group">
                                <label>Short Code</label>
                                <input type="text" id="wh-code" class="input-field" placeholder="e.g. MDC">
                            </div>
                            <div class="form-group">
                                <label>Address</label>
                                <input type="text" id="wh-address" class="input-field">
                            </div>
                            <div id="wh-modal-error" class="error-msg"></div>
                        </div>
                        <div class="modal-footer">
                            <button class="btn-secondary" id="wh-modal-cancel" style="width:auto">Cancel</button>
                            <button class="btn-primary" id="wh-save-btn" style="width:auto">Create Warehouse</button>
                        </div>
                    </div>
                </div>

                <!-- ADD LOCATION MODAL -->
                <div id="loc-modal-overlay" class="modal-overlay" style="display:none">
                    <div class="modal-card">
                        <div class="modal-header">
                            <h3>New Location</h3>
                            <button id="loc-modal-close" class="modal-close">✕</button>
                        </div>
                        <div class="modal-body">
                            <input type="hidden" id="loc-wh-id">
                            <div class="form-group">
                                <label>Location Name</label>
                                <input type="text" id="loc-name" class="input-field"
                                    placeholder="e.g. Aisle 4, Shelf B">
                            </div>
                            <div class="form-group">
                                <label>Short Code</label>
                                <input type="text" id="loc-code" class="input-field" placeholder="e.g. A4-B">
                            </div>
                            <div id="loc-modal-error" class="error-msg"></div>
                        </div>
                        <div class="modal-footer">
                            <button class="btn-secondary" id="loc-modal-cancel" style="width:auto">Cancel</button>
                            <button class="btn-primary" id="loc-save-btn" style="width:auto">Create Location</button>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script src="../js/api.js"></script>
    <script src="../js/layout.js"></script>
    <script src="../js/warehouse.js"></script>
</body>

</html>
