<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - CoreInventory</title>
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/auth.css">
</head>

<body class="auth-page">

    <div class="auth-card">
        <div>
            <h1>CoreInventory</h1>
            <p class="subtitle">Reset your password</p>
        </div>

        <div class="step-indicator">
            <div class="step-dot active" id="dot-1"></div>
            <div class="step-dot" id="dot-2"></div>
            <div class="step-dot" id="dot-3"></div>
        </div>

        <div id="error-msg" class="error-msg"></div>
        <div id="success-msg" class="success-msg"></div>

        <!-- STEP 1: Request OTP -->
        <div id="step-1" class="step active">
            <form id="forgot-form">
                <div class="form-group">
                    <label for="email">Registered Email</label>
                    <input type="email" id="email" class="input-field" placeholder="Enter your account email" required>
                </div>
                <button type="submit" class="btn-primary" id="btn-step-1">Send OTP</button>
            </form>
        </div>

        <!-- STEP 2: Verify OTP -->
        <div id="step-2" class="step">
            <form id="verify-form">
                <p class="subtitle" style="margin-bottom: 10px;">Enter the OTP sent to your email</p>
                <div class="form-group">
                    <label for="otp">One Time Password</label>
                    <input type="text" id="otp" class="input-field" required>
                </div>
                <button type="submit" class="btn-primary" id="btn-step-2">Verify OTP</button>
            </form>
        </div>

        <!-- STEP 3: Reset Password -->
        <div id="step-3" class="step">
            <form id="reset-form">
                <div class="form-group">
                    <label for="new_password">New Password</label>
                    <input type="password" id="new_password" class="input-field" required>
                </div>
                <div class="form-group">
                    <label for="confirm_password">Confirm Password</label>
                    <input type="password" id="confirm_password" class="input-field" required>
                </div>
                <button type="submit" class="btn-primary" id="btn-step-3">Reset Password</button>
            </form>
        </div>

        <div style="text-align: center;">
            <a href="login.html" class="auth-link" style="color: var(--text-muted); font-size: 0.85rem;">Back to
                login</a>
        </div>
    </div>

    <script src="../js/api.js"></script>
    <script src="../js/auth.js"></script>
</body>

</html>
